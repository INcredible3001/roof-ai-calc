<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Планировщик Кровли PRO</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            overflow: hidden;
        }

        #viewport {
            flex: 1;
            position: relative;
            background: #ecf0f1;
        }

        .instruction-3d {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .label-3d {
            color: #ffffff;
            font-family: sans-serif;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            border: 1px solid #555;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        #sidebar {
            width: 450px;
            min-width: 450px;
            background: #ffffff;
            height: 100vh;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        h2 {
            color: #2c3e50;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .box {
            margin-bottom: 30px;
        }

        .box h3 {
            margin-top: 0;
            font-size: 16px;
            color: #34495e;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 13px;
            color: #7f8c8d;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .highlight-input {
            border: 2px solid #3498db !important;
            background-color: #eaf2f8;
        }

        input[readonly] {
            background-color: #f8f9fa;
            color: #7f8c8d;
            cursor: not-allowed;
            border: 1px dashed #bdc3c7;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-blue {
            background-color: #3498db;
        }

        .btn-blue:hover {
            background-color: #2980b9;
        }

        .btn-yellow {
            background-color: #f39c12;
        }

        .btn-yellow:hover {
            background-color: #e67e22;
        }

        .btn-purple {
            background-color: #9b59b6;
        }

        .btn-purple:hover {
            background-color: #8e44ad;
        }

        .btn-dark {
            background-color: #34495e;
            padding: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 3px;
        }

        .result-value {
            font-weight: bold;
            color: #c0392b;
        }

        .final-box {
            background-color: #fdfefe;
            border: 2px solid #1abc9c;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .spec-title {
            font-weight: bold;
            color: #16a085;
            border-bottom: 2px solid #1abc9c;
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-size: 18px;
            text-align: center;
        }

        .spec-section-head {
            font-weight: bold;
            font-size: 13px;
            color: #34495e;
            background: #e8f8f5;
            padding: 8px;
            margin-top: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #1abc9c;
        }

        #schemeResult {
            text-align: center;
            margin-top: 15px;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            display: none;
            border: 1px solid #eee;
        }

        .color-palette {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #bdc3c7;
        }

        input[type="color"] {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #chatHistory {
            height: 200px;
            overflow-y: auto;
            background: #fdfefe;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        #chatInput {
            flex-grow: 1;
        }

        #chatBtn {
            width: auto;
            margin: 0;
            padding: 10px 20px;
        }

        .loader {
            display: none;
            color: #3498db;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        #aiResult {
            margin-top: 15px;
            font-size: 13px;
            white-space: pre-wrap;
            background: #fdfefe;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ecf0f1;
            display: none;
        }
    </style>
</head>

<body>

    <div id="viewport">
        <div class="instruction-3d">Используйте мышь для вращения. Опустите камеру ВНИЗ, чтобы увидеть софиты.</div>
    </div>

    <div id="sidebar">
        <h2>Настройки проекта</h2>

        <div class="box">
            <h3>1. Параметры здания</h3>
            <div class="form-group">
                <label>Тип кровли:</label>
                <select id="roofType" onchange="toggleRoofFields(); render3D();">
                    <option value="shed">Односкатная (Плоская)</option>
                    <option value="gable" selected>Двухскатная (Классика)</option>
                    <option value="hip">Вальмовая (Сложная)</option>
                    <option value="tent">Шатровая (Пирамида)</option>
                    <option value="multi_gable">Многощипцовая (Крест)</option>
                </select>
            </div>

            <div id="gridGeometry" class="grid-2-col">
                <div class="form-group"><label id="lblEaves">Длина дома (м):</label><input type="number" id="mEaves"
                        step="0.01" value="10" oninput="render3D()"></div>
                <div class="form-group"><label id="lblRakes">Ширина дома (м):</label><input type="number" id="mRakes"
                        step="0.01" value="8" oninput="render3D()"></div>

                <div class="form-group"><label id="lblPitch">Угол ската (град):</label><input type="number" id="mPitch"
                        class="highlight-input" step="1" value="30" oninput="render3D()"></div>
                <div class="form-group" id="groupPitchHip" style="display: none;"><label>Угол вальмы
                        (град):</label><input type="number" id="mPitchHip" class="highlight-input" step="1" value="0"
                        oninput="render3D()"></div>
            </div>
            <div style="display: none;">
                <input type="number" id="mSlopeTrap" value="0"><input type="number" id="mSlopeHip" value="0">
            </div>
        </div>

        <div class="box" style="background: #f8f9fa; padding: 15px; border: 1px solid #dfe6e9;">
            <h3>2. Внешний вид (Бренды)</h3>
            <div class="form-group">
                <label>Покрытие крыши:</label>
                <select id="materialType" onchange="updateBrandMenu()">
                    <option value="metal">Металлочерепица / Профнастил</option>
                    <option value="soft">Гибкая черепица (Мягкая)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Бренд / Коллекция:</label>
                <select id="roofBrand" onchange="render3D()">
                    <option value="megasteel">Мегастил (Фактум)</option>
                    <option value="classic">Grand Line Classic</option>
                </select>
            </div>

            <label style="font-weight: 600; font-size: 13px; color: #7f8c8d; margin-bottom: 5px; display: block;">Цвет
                по RAL:</label>
            <div class="color-palette">
                <div class="color-swatch" style="background-color: #3b2821;" onclick="changeColor(0x3b2821)"
                    title="RAL 8017 Шоколад"></div>
                <div class="color-swatch" style="background-color: #8c8c8e;" onclick="changeColor(0x8c8c8e)"
                    title="RAL 7004 Сигнальный серый"></div>
                <div class="color-swatch" style="background-color: #2b2c2f;" onclick="changeColor(0x2b2c2f)"
                    title="RAL 7024 Графит"></div>
                <div class="color-swatch" style="background-color: #5e2028;" onclick="changeColor(0x5e2028)"
                    title="RAL 3005 Красное вино"></div>
                <div class="color-swatch" style="background-color: #2a3a32;" onclick="changeColor(0x2a3a32)"
                    title="RAL 6005 Зеленый мох"></div>
                <div class="color-swatch" style="background-color: #6d3f2b;" onclick="changeColor(0x6d3f2b)"
                    title="RAL 8004 Медь"></div>
                <input type="color" id="customColor" value="#3b2821" oninput="changeColor(this.value)"
                    title="Свой цвет">
            </div>
        </div>

        <div class="box" style="border-left: 4px solid #3498db; padding-left: 15px;">
            <h3>3. Водосток и Софиты</h3>
            <div class="grid-2-col" style="margin-bottom: 12px;">
                <div class="form-group"><label>Высота стен (м):</label><input type="number" id="mWallHeight" value="3.5"
                        step="0.1" oninput="render3D()"></div>
                <div class="form-group"><label>Свес (софит, м):</label><input type="number" id="vSoffitWidth"
                        value="0.5" step="0.1" oninput="render3D()"></div>

                <div class="form-group">
                    <label>Тип софита:</label>
                    <select id="soffitType" onchange="render3D()">
                        <option value="solid">Сплошной</option>
                        <option value="center" selected>С центр. перфорацией</option>
                        <option value="full">С полной перфорацией</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цвет софита:</label>
                    <select id="soffitColor" onchange="render3D()">
                        <option value="#ffffff">Белый</option>
                        <option value="#3b2821">Шоколад</option>
                        <option value="#2b2c2f">Графит</option>
                        <option value="#e67e22">Под дерево</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Воронки (стояки):</label><input type="number" id="vOutlets" value="4" min="0"
                    oninput="render3D()"></div>
        </div>

        <div class="box">
            <h3>4. Расчет спецификации</h3>
            <div id="hiddenDetailsBox" style="display: none;">
                <input type="number" id="mRidges" value="0"><input type="number" id="mHips" value="0">
                <input type="number" id="mValleys" value="0"><input type="number" id="mAbutments" value="0">
                <input type="number" id="mArea" value="0">
                <button onclick="processAndDraw()">Нарисовать 2D</button>
                <div id="schemeResult"></div>
            </div>
            <button class="btn-yellow" onclick="calculateFinal()">РАССЧИТАТЬ СПЕЦИФИКАЦИЮ</button>
        </div>

        <div class="final-box" id="finalBox">
            <div class="spec-title">Итоговая спецификация</div>
            <div id="specContent"></div>
            <button class="btn-blue" style="margin-top: 20px;">ОТПРАВИТЬ СЧЕТ В 1С (API)</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #ecf0f1; margin: 30px 0;">

        <div class="box">
            <h3>ИИ-Ассистент</h3>
            <div id="chatHistory"></div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Ваш вопрос...">
                <button class="btn-dark" id="chatBtn" onclick="sendChatMessage()">Ответить</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let currentRoofColor = 0x3b2821;

        window.addEventListener('resize', () => {
            const vp = document.getElementById('viewport');
            if (camera && renderer && labelRenderer) {
                camera.aspect = vp.clientWidth / vp.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(vp.clientWidth, vp.clientHeight);
                labelRenderer.setSize(vp.clientWidth, vp.clientHeight);
            }
        });

        function changeColor(colorValue) {
            currentRoofColor = (typeof colorValue === 'string') ? parseInt(colorValue.replace('#', '0x')) : colorValue;
            render3D();
        }

        // Обновление меню брендов при смене материала
        function updateBrandMenu() {
            const matType = document.getElementById('materialType').value;
            const brandSel = document.getElementById('roofBrand');
            brandSel.innerHTML = '';
            if (matType === 'metal') {
                brandSel.innerHTML = '<option value="megasteel">Мегастил (Фактум)</option><option value="classic">Grand Line Classic</option>';
            } else {
                brandSel.innerHTML = '<option value="faracs">Faracs (Шестигранник)</option>';
            }
            render3D();
        }

        function toggleRoofFields() {
            const rType = document.getElementById('roofType').value;
            const groupPitchHip = document.getElementById('groupPitchHip');
            if (rType === 'hip') {
                document.getElementById('lblEaves').innerText = "Длина дома (м):";
                document.getElementById('lblRakes').innerText = "Ширина дома (м):";
                groupPitchHip.style.display = "block";
            } else if (rType === 'multi_gable') {
                document.getElementById('lblEaves').innerText = "Длина фасада (м):";
                document.getElementById('lblRakes').innerText = "Пересечение (м):";
                groupPitchHip.style.display = "none";
            } else {
                document.getElementById('lblEaves').innerText = "Длина дома (м):";
                document.getElementById('lblRakes').innerText = "Ширина дома (м):";
                groupPitchHip.style.display = "none";
            }
        }

        window.onload = function () { toggleRoofFields(); updateBrandMenu(); init3D(); render3D(); };

        // --- МАТЕМАТИКА РАСЧЕТА (Скрытая) ---
        function doMath() {
            const rType = document.getElementById('roofType').value;
            let L = parseFloat(document.getElementById('mEaves').value) || 0; let W = parseFloat(document.getElementById('mRakes').value) || 0;
            let P1 = parseFloat(document.getElementById('mPitch').value) || 0; let P2 = parseFloat(document.getElementById('mPitchHip').value) || 0;
            if (P2 === 0) P2 = P1;
            let cos1 = (P1 > 0 && P1 < 89) ? Math.cos(P1 * Math.PI / 180) : 1; let cos2 = (P2 > 0 && P2 < 89) ? Math.cos(P2 * Math.PI / 180) : 1;
            let S1 = 0, S2 = 0, Ridge = 0, Hip = 0, Valleys = 0;

            if (rType === 'shed') {
                S1 = W / cos1; Ridge = L;
            } else if (rType === 'gable') {
                S1 = (W / 2) / cos1; Ridge = L;
            } else if (rType === 'hip') {
                S1 = (W / 2) / cos1; S2 = (W / 2) / cos2; let planH = (W / 2) * Math.tan(P1 * Math.PI / 180); Ridge = L > W ? L - W : 0; let planHip = Math.sqrt(Math.pow(W / 2, 2) + Math.pow(W / 2, 2)); Hip = Math.sqrt(Math.pow(planHip, 2) + Math.pow(planH, 2));
            } else if (rType === 'tent') {
                let H = (Math.min(L, W) / 2) * Math.tan(P1 * Math.PI / 180); S1 = Math.sqrt(Math.pow(L / 2, 2) + H * H); S2 = Math.sqrt(Math.pow(W / 2, 2) + H * H); Ridge = 0; let planHip = Math.sqrt(Math.pow(L / 2, 2) + Math.pow(W / 2, 2)); Hip = Math.sqrt(Math.pow(planHip, 2) + Math.pow(H, 2));
            } else if (rType === 'multi_gable') { let D = Math.min(L, W) * 0.5; S1 = (D / 2) / cos1; Ridge = L + W - D; let planValley = (D / 2) * Math.sqrt(2); let H = (D / 2) * Math.tan(P1 * Math.PI / 180); Valleys = Math.sqrt(Math.pow(planValley, 2) + Math.pow(H, 2)) * 4; }

            document.getElementById('mSlopeTrap').value = S1 > 0 ? S1.toFixed(2) : 0; document.getElementById('mSlopeHip').value = S2 > 0 ? S2.toFixed(2) : 0; document.getElementById('mRidges').value = Ridge > 0 ? Ridge.toFixed(2) : 0; document.getElementById('mHips').value = Hip > 0 ? Hip.toFixed(2) : 0; document.getElementById('mValleys').value = Valleys > 0 ? Valleys.toFixed(2) : 0;
            return { rType, L, W, P1, P2, S1, S2, Ridge, Hip, Valleys, cos1, cos2 };
        }

        function calculateFinal() {
            let vars = doMath();
            let area = parseFloat(document.getElementById('mArea').value) || 0; let abutments = parseFloat(document.getElementById('mAbutments').value) || 0;
            let H_wall = parseFloat(document.getElementById('mWallHeight').value) || 3.5; let nOutlets = parseInt(document.getElementById('vOutlets').value) || 0; let soffWidth = parseFloat(document.getElementById('vSoffitWidth').value) || 0;
            let cEaves = 0, cRakes = 0, cRidges = 0, cHips = 0, cValleys = vars.Valleys, cAbutments = abutments; let slopedArea = 0;

            if (vars.rType === 'shed') { cEaves = vars.L; cRakes = vars.S1 * 2; cAbutments = abutments > 0 ? abutments : vars.L; slopedArea = vars.L * vars.S1; area = vars.L * vars.W; } else if (vars.rType === 'gable') { cEaves = vars.L * 2; cRakes = vars.S1 * 4; cRidges = vars.Ridge; slopedArea = (vars.L * vars.S1) * 2; area = vars.L * vars.W; } else if (vars.rType === 'hip') { cEaves = (vars.L * 2) + (vars.W * 2); cHips = vars.Hip * 4; cRidges = vars.Ridge; slopedArea = ((vars.L + vars.Ridge) * vars.S1) + (vars.W * vars.S2); area = vars.L * vars.W; } else if (vars.rType === 'tent') { cEaves = vars.L * 2 + vars.W * 2; cHips = vars.Hip * 4; cRidges = 0; cRakes = 0; slopedArea = (vars.L * vars.S2) + (vars.W * vars.S1); area = vars.L * vars.W; } else if (vars.rType === 'multi_gable') { let D = Math.min(vars.L, vars.W) * 0.5; cEaves = 2 * vars.L + 2 * vars.W - 4 * D; cRakes = vars.S1 * 8; cRidges = vars.Ridge; area = vars.L * D + vars.W * D - D * D; slopedArea = area * (1 / vars.cos1); }
            document.getElementById('mArea').value = area.toFixed(2);

            let nGutters = Math.ceil(cEaves / 3); let nBrackets = Math.ceil(cEaves / 0.6) + 4; let nConnectors = Math.ceil(cEaves / 3) + 2;
            let nEndCaps = 0; if (vars.rType === 'shed') nEndCaps = 2; if (vars.rType === 'gable') nEndCaps = 4; if (vars.rType === 'multi_gable') nEndCaps = 8;
            let nCorners = 0; if (vars.rType === 'hip' || vars.rType === 'tent') nCorners = 4; if (vars.rType === 'multi_gable') nCorners = 4;
            let nPipes = Math.ceil(Math.max(0, (H_wall - 0.3)) * nOutlets / 3); let nElbows = nOutlets * 3; let nClamps = Math.ceil(Math.max(0, (H_wall - 0.3)) * nOutlets / 1.5) + nOutlets;
            let soffitArea = cEaves * soffWidth; if (vars.rType === 'gable' || vars.rType === 'shed' || vars.rType === 'multi_gable') { soffitArea += cRakes * soffWidth; }
