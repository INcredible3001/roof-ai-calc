<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный калькулятор с ИИ и чатом</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }

        .box {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .ai-box {
            background-color: #fdfefe;
            border: 2px dashed #3498db;
        }

        .manual-box {
            background-color: #fef9e7;
            border: 2px solid #f1c40f;
            /* Ручной ввод теперь открыт всегда! */
        }

        .final-box {
            background-color: #e8f8f5;
            border: 2px solid #1abc9c;
            display: none;
        }

        .chat-box {
            background-color: #f4f6f7;
            border: 1px solid #bdc3c7;
            margin-top: 30px;
        }

        input[type="file"] {
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-blue {
            background-color: #3498db;
        }

        .btn-blue:hover {
            background-color: #2980b9;
        }

        .btn-yellow {
            background-color: #f39c12;
        }

        .btn-yellow:hover {
            background-color: #e67e22;
        }

        .btn-dark {
            background-color: #34495e;
            padding: 10px;
        }

        #aiResult {
            margin-top: 15px;
            font-size: 14px;
            white-space: pre-wrap;
            background: #fff;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ecf0f1;
            display: none;
        }

        .loader {
            display: none;
            color: #3498db;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .highlight-input {
            border: 2px solid #3498db !important;
            background-color: #eaf2f8;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 5px;
        }

        .result-value {
            font-weight: bold;
            color: #c0392b;
        }

        /* Стили для чата */
        #chatHistory {
            height: 200px;
            overflow-y: auto;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .msg-user {
            color: #2980b9;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .msg-ai {
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 2px;
            margin-top: 10px;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        #chatInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
        }

        #chatBtn {
            width: auto;
            margin: 0;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Профессиональный расчет кровли</h2>

        <div class="box manual-box" id="manualBox">
            <h3 style="margin-top: 0;">Шаг 1: Укажите размеры и параметры кровли</h3>
            <div class="grid-form">

                <div class="form-group" style="grid-column: span 2;">
                    <label>Тип кровли:</label>
                    <select id="roofType"
                        style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="shed">Односкатная (Плоская)</option>
                        <option value="gable">Двухскатная (Классика)</option>
                        <option value="hip">Вальмовая (4 ската)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Угол наклона (в градусах):</label>
                    <input type="number" id="mPitch" class="highlight-input" step="1" value="0">
                </div>
                <div class="form-group"><label>Общая площадь (в плане):</label><input type="number" id="mArea"
                        step="0.01" value="0"></div>
                <div class="form-group"><label>Длина карнизов (м):</label><input type="number" id="mEaves" step="0.01"
                        value="0"></div>
                <div class="form-group"><label>Длина торцов (м):</label><input type="number" id="mRakes" step="0.01"
                        value="0"></div>
                <div class="form-group"><label>Длина коньков (м):</label><input type="number" id="mRidges" step="0.01"
                        value="0"></div>
                <div class="form-group"><label>Длина хребтов (м):</label><input type="number" id="mHips" step="0.01"
                        value="0"></div>
                <div class="form-group"><label>Длина ендов (м):</label><input type="number" id="mValleys" step="0.01"
                        value="0"></div>
                <div class="form-group"><label>Длина примыканий (м):</label><input type="number" id="mAbutments"
                        step="0.01" value="0"></div>
            </div>

            <button class="btn-blue" onclick="drawScheme()"
                style="background-color: #9b59b6; margin-top: 15px; margin-bottom: 15px;">Нарисовать 2D схему
                кровли</button>
            <div id="schemeResult"
                style="text-align: center; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 4px; display: none;">
            </div>

            <button class="btn-yellow" onclick="calculateFinal()">Рассчитать с углом и запасами</button>
        </div>

        <div class="box final-box" id="finalBox">
            <h3 style="margin-top: 0; color: #16a085;">Шаг 2: Итоговые материалы для закупки</h3>
            <p style="font-size: 13px; color: #7f8c8d; margin-top: -10px;">Математика: Площадь и торцы увеличены с
                учетом косинуса угла наклона.</p>

            <div class="result-item"><span>Кровельное покрытие (+10%):</span> <span class="result-value"><span
                        id="fArea">0</span> м²</span></div>
            <div class="result-item"><span>Планка карнизная (+5%):</span> <span class="result-value"><span
                        id="fEaves">0</span> м</span></div>
            <div class="result-item"><span>Планка торцевая (+5%):</span> <span class="result
